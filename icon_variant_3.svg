<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Variant 3: Book spine with circular WWW badge - Red & Teal theme -->
  <defs>
    <linearGradient id="book1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0392B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="book2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E67E22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D35400;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="book3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F39C12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E67E22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wwwBadge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1ABC9C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16A085;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="96" cy="96" r="88" fill="#FEF5E7"/>

  <!-- Stack of books (spine view) -->
  <g>
    <!-- Book 1 (front) -->
    <g>
      <rect x="50" y="65" width="30" height="110" rx="3" fill="url(#book1)"/>
      <rect x="53" y="68" width="24" height="104" rx="2" fill="#F1948A" opacity="0.3"/>
      <rect x="50" y="65" width="5" height="110" fill="#922B21"/>
      <text x="65" y="125" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle" transform="rotate(90 65 125)">OPDS</text>
    </g>

    <!-- Book 2 (middle) -->
    <g>
      <rect x="85" y="55" width="30" height="125" rx="3" fill="url(#book2)"/>
      <rect x="88" y="58" width="24" height="119" rx="2" fill="#F0B27A" opacity="0.3"/>
      <rect x="85" y="55" width="5" height="125" fill="#A04000"/>
    </g>

    <!-- Book 3 (back) -->
    <g>
      <rect x="120" y="70" width="30" height="100" rx="3" fill="url(#book3)"/>
      <rect x="123" y="73" width="24" height="94" rx="2" fill="#F8C471" opacity="0.3"/>
      <rect x="120" y="70" width="5" height="100" fill="#B9770E"/>
    </g>
  </g>

  <!-- WWW Circular Badge -->
  <g>
    <!-- Outer circle with shadow -->
    <circle cx="96" cy="135" r="42" fill="#000000" opacity="0.15"/>
    <circle cx="96" cy="132" r="42" fill="url(#wwwBadge)"/>
    <circle cx="96" cy="132" r="38" fill="none" stroke="#FFFFFF" stroke-width="3"/>

    <!-- WWW Text -->
    <text x="96" y="122" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">W</text>
    <text x="96" y="138" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">W</text>
    <text x="96" y="154" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">W</text>

    <!-- Decorative dots between W's -->
    <circle cx="96" cy="126" r="2" fill="#FFFFFF"/>
    <circle cx="96" cy="143" r="2" fill="#FFFFFF"/>
  </g>
</svg>
